<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="#0f0f13"/>
  <rect x="4" y="4" width="192" height="4" rx="2" fill="url(#grad)"/>
  <!-- K letter -->
  <text x="100" y="130" text-anchor="middle" fill="url(#grad)" font-family="Helvetica,sans-serif" font-weight="bold" font-size="80">K</text>
  <text x="100" y="175" text-anchor="middle" fill="#9898a8" font-family="Helvetica,sans-serif" font-size="12" letter-spacing="4">KAIRON</text>
</svg>
